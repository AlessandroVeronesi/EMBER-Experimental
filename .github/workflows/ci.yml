name: Ember CI (build, lint, test)

on:
  

  
  pull_request:
    branches: [ main ]
  
  workflow_dispatch:



jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (CMake, compiler, lint tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            clang-format \
            cppcheck \
            clang-tidy

      - name: Make scripts executable
        run: |
          chmod +x ./tools.sh
          chmod +x ./scripts/*.sh
          chmod +x ./tools/coverage/*.sh


      - name: Configure CMake
        run: |
          cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DBUILD_TESTS=ON \
          -DBUILD_EXAMPLES=OFF


      - name: clang-format (style check)
        continue-on-error: true
        run: |
          ./tools.sh format
      
      - name: clang-tidy check
        continue-on-error: true
        run: |
          clang-tidy \
          -p build \
          $(git ls-files '*.h' '*.hpp' '*.c' '*.cc' '*.cpp' '*.cxx' '*.tpp')
        

      - name: Cpp-check
        continue-on-error: true
        
        run: |
          ./tools.sh cppcheck

      - name: Build
        run: |
          cmake --build build --config Release -- -j"$(nproc)"

      - name: Run tests (CTest)
        run: |
          ctest --test-dir build --output-on-failure

      - name: CI Finished
        run: |
          echo "✅ Build and tests passed."
          
